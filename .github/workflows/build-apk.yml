name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/keystore.jks \
            -alias lotmtcg \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Beyond the Veil, O=LochéSystem, L=BR"

      - name: Add signing config
        run: |
          cat >> android/app/build.gradle << 'SIGNING'

          android {
              signingConfigs {
                  release {
                      storeFile file("../keystore.jks")
                      storePassword "android"
                      keyAlias "lotmtcg"
                      keyPassword "android"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          SIGNING

      - name: Setup Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lotm-tcg
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "LOTM TCG APK #${{ github.run_number }}"
          body: "APK gerado automaticamente a partir do commit ${{ github.sha }}"
          files: android/app/build/outputs/apk/release/app-release.apk
